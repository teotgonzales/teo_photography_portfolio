<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teo Gonzales</title>
  </head>
  <body>
    <script>
      const isGitHubProjectSite = window.location.hostname.endsWith('github.io');
      const pathSegments = window.location.pathname.split('/').filter(Boolean);
      const basePath = isGitHubProjectSite && pathSegments.length ? `/${pathSegments.shift()}` : '';
      const route = `/${pathSegments.join('/')}${window.location.search}${window.location.hash}`;
      window.location.replace(`${window.location.origin}${basePath}/?route=${encodeURIComponent(route)}`);
    </script>
  </body>
</html>
