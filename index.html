<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A minimal photography portfolio for portraits, live work, editorial, commercial, and motion projects."
    />
    <title>Teo Gonzales Photography</title>
  </head>
  <body>
    <script>
      const redirectRoute = new URLSearchParams(window.location.search).get('route');

      if (redirectRoute) {
        const basePath = window.location.hostname.endsWith('github.io')
          ? '/teo_photography_portfolio'
          : '';
        window.history.replaceState(null, '', `${basePath}${redirectRoute}`);
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
